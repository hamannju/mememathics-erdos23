name: Bootstrap campaign snapshot

on:
  push:
    branches: ["agent/bootstrap-campaign"]
    paths:
      - ".bootstrap/**"
      - ".github/workflows/bootstrap.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/bootstrap-campaign
          fetch-depth: 0
      - name: Extract verified snapshot
        run: python .bootstrap/extract.py
      - name: Remove transport files
        run: rm -rf .bootstrap
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bootstrap reproducible Erdős 23 campaign"
          git push origin HEAD:agent/bootstrap-campaign
